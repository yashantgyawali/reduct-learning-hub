<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reduct Scenario Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#3B3BA0;--pd:#2A2A80;--pl:#EEEEFF;--pm:#8080CC;
  --w:#fff;--bg:#F8F9FC;--sur:#fff;--bdr:#E5E7EB;
  --txt:#1F2937;--mu:#6B7280;--lt:#9CA3AF;
  --sw:252px;--hh:54px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--txt);background:var(--bg);line-height:1.6;font-size:15px}
a{text-decoration:none;color:inherit}

/* HEADER */
#hdr{position:fixed;inset:0 0 auto 0;height:var(--hh);background:var(--p);display:flex;align-items:center;padding:0 24px;gap:20px;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.22)}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.logo-brand{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.4px}
.logo-sep{width:1px;height:16px;background:rgba(255,255,255,.3)}
.logo-sub{font-size:13px;color:rgba(255,255,255,.72);white-space:nowrap}
.hsearch{flex:1;max-width:420px;position:relative}
.hsearch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:rgba(255,255,255,.55);pointer-events:none}
.hsearch input{width:100%;height:34px;padding:0 12px 0 34px;border:none;border-radius:6px;background:rgba(255,255,255,.14);color:#fff;font-size:13.5px;font-family:var(--font);outline:none;transition:background .15s}
.hsearch input::placeholder{color:rgba(255,255,255,.5)}
.hsearch input:focus{background:rgba(255,255,255,.22)}

/* LAYOUT */
#body{display:flex;padding-top:var(--hh);min-height:100vh}

/* SIDEBAR */
#sbar{width:var(--sw);min-width:var(--sw);background:var(--sur);border-right:1px solid var(--bdr);position:fixed;top:var(--hh);bottom:0;overflow-y:auto;padding:20px 0 24px;display:none}
#sbar.on{display:block}
.sb-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--lt);padding:0 16px 10px;display:block}
.sb-item{display:flex;align-items:flex-start;padding:6px 16px;font-size:13px;color:var(--mu);cursor:pointer;border-left:2px solid transparent;transition:all .1s;gap:8px;line-height:1.4}
.sb-item:hover{background:var(--bg);color:var(--txt)}
.sb-item.on{color:var(--p);font-weight:500;border-left-color:var(--p);background:var(--pl)}
.sb-num{font-size:11px;font-weight:600;color:var(--lt);min-width:16px;padding-top:1px}
.sb-item.on .sb-num{color:var(--pm)}
.sb-subs{padding:2px 0 6px}
.sb-sub{display:block;padding:4px 16px 4px 40px;font-size:12px;color:var(--mu);cursor:pointer;border-left:2px solid transparent;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.sb-sub:hover{color:var(--txt);background:var(--bg)}
.sb-sub.on{color:var(--p);border-left-color:var(--p);background:var(--pl);font-weight:500;white-space:normal}

/* MAIN */
#main{flex:1;min-width:0}
#main.sb{margin-left:var(--sw)}

/* HOME */
.home-hero{background:linear-gradient(155deg,var(--p) 0%,#4848B8 100%);padding:52px 48px 44px}
.home-hero h1{font-size:27px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:8px}
.home-hero p{font-size:14.5px;color:rgba(255,255,255,.72);max-width:520px;line-height:1.6}
.home-body{padding:32px 48px 52px;max-width:1080px}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--lt);margin-bottom:16px}
.stage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:14px}
.s-card{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s;display:flex;flex-direction:column;gap:10px}
.s-card:hover{border-color:#A0A0D8;box-shadow:0 2px 12px rgba(59,59,160,.1);transform:translateY(-1px)}
.s-card-head{display:flex;align-items:center;gap:12px}
.s-badge{width:32px;height:32px;border-radius:8px;background:var(--pl);color:var(--p);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-card-head h3{font-size:14.5px;font-weight:600;color:var(--txt);line-height:1.3}
.s-card p{font-size:12.5px;color:var(--mu);line-height:1.55}
.s-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.sc-count{font-size:11.5px;color:var(--lt)}
.c-arrow{color:var(--lt);display:flex}

/* PAGE HEADER */
.phdr{padding:24px 36px 20px;background:var(--sur);border-bottom:1px solid var(--bdr)}
.bc{font-size:12px;color:var(--lt);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bc .lnk{color:var(--p);cursor:pointer}
.bc .lnk:hover{text-decoration:underline}
.bc .sep{color:var(--lt)}
.phdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.phdr .sub{font-size:13px;color:var(--mu)}

/* SCENARIO CARDS */
.sc-list{padding:24px 36px;max-width:780px;display:flex;flex-direction:column;gap:12px}
.sc-card{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:18px 20px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px}
.sc-card:hover{border-color:#A0A0D8;box-shadow:0 1px 8px rgba(59,59,160,.1)}
.sc-card h3{font-size:14.5px;font-weight:600;color:var(--txt);line-height:1.35}
.sc-prev{font-size:12.5px;color:var(--mu);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;font-weight:500;color:var(--p);background:var(--pl);padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;text-decoration:none}
a.tag{transition:background .12s}
a.tag:hover{background:#E0E0F8}
.tag-arr{opacity:0;transition:opacity .12s;display:flex;align-items:center;color:var(--pm);flex-shrink:0}
a.tag:hover .tag-arr{opacity:1}

/* SCENARIO DETAIL */
.sc-layout{display:flex;align-items:flex-start}
.sc-art{flex:1;min-width:0;padding:32px 40px;max-width:740px}
.sc-meta{margin-bottom:24px}
.stage-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--p);background:var(--pl);padding:3px 10px;border-radius:20px;font-weight:500;cursor:pointer;margin-bottom:12px;transition:background .1s}
.stage-tag:hover{background:#E0E0F8}
.sc-art h1{font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1.3}
.sc-sec{margin-bottom:28px}
.sec-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--lt);margin-bottom:10px}
.sec-h-lg{font-size:18px;font-weight:700;text-transform:none;letter-spacing:-.25px;color:var(--txt);margin-bottom:14px}
.sec-body{font-size:14.5px;line-height:1.75;color:var(--txt)}
.sec-body p+p{margin-top:12px}
.sec-body p+ul,.sec-body ul+p{margin-top:10px}

/* FEELING TAGS */
.feeling-tags{display:flex;flex-wrap:wrap;gap:6px}
.feeling-tag{font-size:12px;font-weight:500;color:#78716C;background:#F5F5F4;border:1px solid #E7E5E4;padding:3px 11px;border-radius:20px}

/* BULLET LISTS */
.sc-bullets{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.sc-bullets li{font-size:14px;line-height:1.6;color:var(--txt);padding-left:18px;position:relative}
.sc-bullets li::before{content:'—';position:absolute;left:0;color:var(--lt);font-size:13px}

/* QUESTION LIST (inside How Reduct helps) */
.sc-q-list{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px 14px 36px;list-style:disc;margin:4px 0}
.sc-q-list li{font-size:13.5px;color:var(--mu);line-height:1.65;padding-left:0}
.sc-q-list li::before{display:none}
.q-list-wrap{position:relative}
.copy-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border:none;border-radius:6px;background:transparent;color:var(--lt);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.copy-btn:hover{background:var(--bdr);color:var(--mu)}
.copy-btn.copied{color:#16A34A}

/* HELPS FEATURE HEADERS */
.helps-head{display:flex;align-items:center;gap:10px;margin:28px 0 10px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.helps-head:first-child{margin-top:4px}
.helps-step-num{width:22px;height:22px;border-radius:50%;background:var(--p);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.helps-step-title{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.25px}

/* FAQs */
.faq-list{display:flex;flex-direction:column;gap:16px}
.faq-item{padding:14px 16px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px}
.faq-q{font-size:13.5px;font-weight:600;color:var(--txt);margin-bottom:6px;line-height:1.5}
.faq-a{font-size:13.5px;color:var(--mu);line-height:1.75}

/* VIDEO PLACEHOLDER */
.vid-block{background:var(--bg);border:1.5px dashed #C8C8E0;border-radius:10px;padding:28px 24px;text-align:center;margin:4px 0 28px}
.play-btn{width:48px;height:48px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--p)}
.vid-block p{font-size:13.5px;font-weight:500;color:var(--mu);margin-bottom:2px}
.vid-block small{font-size:11.5px;color:var(--lt)}

/* OUTCOME */
.outcome{background:var(--pl);border-left:3px solid var(--p);border-radius:0 8px 8px 0;padding:16px 20px}
.outcome p{font-size:14.5px;line-height:1.75;color:#2A2A70}

/* TOC */
.sc-toc{width:200px;min-width:200px;padding:32px 20px 32px 16px;position:sticky;top:calc(var(--hh) + 20px);align-self:flex-start}
.toc-h{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--lt);margin-bottom:10px}
.toc-a{display:block;padding:4px 0 4px 10px;font-size:12px;color:var(--mu);cursor:pointer;border-left:2px solid var(--bdr);line-height:1.4;transition:all .1s;margin-bottom:2px}
.toc-a:hover{color:var(--p);border-left-color:var(--pm)}
.toc-a.on{color:var(--p);border-left-color:var(--p);font-weight:500}

/* SEARCH */
.srch-page{padding:28px 40px;max-width:800px}
.srch-hdr{margin-bottom:24px}
.srch-hdr h2{font-size:18px;font-weight:700;margin-bottom:4px}
.srch-hdr p{font-size:13px;color:var(--mu)}
.srch-grp{margin-bottom:28px}
.srch-grp-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--lt);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.sr-item{padding:12px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.sr-item:last-child{border-bottom:none}
.sr-item:hover .sr-t{color:var(--p)}
.sr-t{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px;transition:color .1s}
.sr-p{font-size:12.5px;color:var(--mu);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.no-res{padding:60px 40px;text-align:center}
.no-res h3{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:6px}
.no-res p{font-size:13.5px;color:var(--mu)}
.empty{padding:60px 40px;text-align:center;color:var(--mu);font-size:14px}

/* MOBILE */
@media(max-width:768px){
  #sbar{display:none!important}
  #main.sb{margin-left:0}
  .home-hero{padding:32px 20px 28px}
  .home-hero h1{font-size:22px}
  .home-body{padding:24px 20px 40px}
  .stage-grid{grid-template-columns:1fr}
  .phdr{padding:20px}
  .sc-list{padding:16px 20px}
  .sc-art{padding:20px;max-width:100%}
  .sc-toc{display:none}
  .srch-page{padding:20px}
  .logo-sub{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── DATA ─────────────────────────────────────────────────────
const STAGES=[
{id:1,title:"Probable Cause Hearing",desc:"Discovery drops the night before. Get the shape of the story before tomorrow's hearing.",scenarios:[
{id:1,
title:"I got discovery the night before the hearing.",
situation:"You just got the case, and the discovery dropped just now. The probable cause hearing is tomorrow morning. You don't have time to watch everything. You need to know what happened, fast, so you can question the officer.\n\nBUT you have hours of footage and just a night to prepare. Watching everything isn't an option. You can read through the main documents, like police reports and affidavits, but they tell the side of the story that played out perfectly for them. The main job is to find contradictions and ask good questions that will make the officer uncomfortable and lock them into a story on the record on day one of the case. And you need the shape of the story before you can ask good questions.\n\nHowever, with so much discovery and a night to prepare, it's practically impossible.\n\nIdeally, it would be nice to walk into probable cause with a specific, chronological event list and a good mental note of what exactly happened. And even better if you can have a good list of questions to ask the officer. Reduct helps you do just that.",
problem:"",
helps:[
  {head:"Upload your discovery"},
  "Throw all your discovery to Reduct. Even better if we can work with your IT department to set up integrations with your case management system, so that everything that comes to your case management system or your cloud storage solution can automatically come in to Reduct.",
  {head:"Run a batch summary"},
  "With all your files in a single cloud platform, you can run a batch summary with targeted questions that are relevant for a probable cause hearing. The goal of a batch summary is not deep analysis, but rather fast orientation.",
  "You want to know the shape of the case before you walk in.",
  {head:"Custom question template"},
  "Here are the custom question sets worth running, organized by what you are trying to find out.",
  ["What was the stated reason for the stop, approach, or arrest?",
   "What specific facts does this file state as justification for probable cause?",
   "What sequence of events does this file describe?",
   "What did the officer claim to observe directly?",
   "What statements did the suspect make?",
   "What statements did any witnesses make?",
   "Did anyone invoke their right to remain silent or ask for a lawyer?",
   "Are there any qualifications, uncertainties, or contradictions stated?",
   "What is the most specific factual claim made in this file?"],
  "Use this as your map and not as the record of what happened. The summary is just like a table of contents, which lets you click on it and take you to the right moment in the video or document. With this, you will have a better idea of what happened, who said what, and what to ask the officer tomorrow.",
  "It will be important to ask very targeted questions and lock in the police side story on this day.",
  "Later, when you're in the hearing, you can check the officer's live testimony against all the discovery to find contradictions. It's even better to invite relevant people to the project, add tags, and comments to the parts that will be relevant for later."
],
features:["Upload","Batch Summarize","Custom Summary","Collaboration in Reduct"],
outcome:"",
faqs:[
  {q:"With all the AI hallucination, how good is the summary? I could never trust it.",
   a:"A summary should never be treated as the record of what happened. You will need to think of it as a table of contents (but on things that you care about). So for every question you put in, you get the answers with a clickable timestamp that takes you to that moment that generated the summary. So, skim the summary, find the answer that you care about, click on the link, and read the actual transcript or the document."}
]},
{id:2,title:"Does the body-cam match the officer's statement in the affidavit?",
situation:"You have the Gerstein affidavit — the officer's written statement of probable cause. You want to check whether what they wrote matches what's actually on the body-cam.",
problem:"Manually cross-referencing a written affidavit with hours of video is tedious. You're looking for specific moments — but you don't know exactly where they are.",
helps:"Take the key claims from the affidavit and run keyword searches in Reduct against your transcribed body-cam footage. Reduct surfaces the exact moments where those words (or related words) appear. You can jump straight to that moment in the video, watch it, and decide if the story holds up.",
features:["Keyword Search","Fuzzy Search","Transcript Navigation"],
outcome:"In 15 minutes, you've cross-referenced the affidavit against the footage. If there's a contradiction, you've found it. If it holds up, you know that too. Either way, you're asking sharper questions tomorrow."}
]},
{id:2,title:"Defense Investigation",desc:"Find missing footage and extract what's useful from witness recordings.",scenarios:[
{id:1,title:"I need to figure out what footage we might be missing.",
situation:"You're watching body-cam to build your defense investigation. You need to figure out if there are other cameras — storefronts, Ring doorbells, traffic cams — that may have captured the incident. If so, you need to act fast before that footage gets deleted.",
problem:"You're watching video while also trying to mentally map the physical scene. It's easy to miss things. And there's no good way to flag what you see for your investigator without writing it all down separately.",
helps:"As you watch the body-cam in Reduct, add a comment or tag at any moment where you spot a potential camera — a store sign, a private property notice, a doorbell camera in the frame. These timestamped comments become a to-do list for your investigator. Export or share the clip with the comment directly.",
features:["Comments","Tags","Clip Export","Share"],
outcome:"Your investigator gets a precise, timestamped list of locations to chase — not a vague verbal briefing. You haven't missed anything obvious. You've done this in one pass of the footage."},
{id:2,title:"We recorded a witness interview. Now we need to use it.",
situation:"After your first unrecorded conversation with a witness, you conducted a second recorded interview — focused on what's actually useful to your case. Now you need to extract the key statements from that recording.",
problem:"Recorded witness interviews are valuable, but only if you can find the good parts. Scrubbing through an hour-long recording to find three key statements is slow. And hand-transcribing those statements into your notes is even slower.",
helps:"Upload the witness recording to Reduct. The transcript surfaces immediately. Search for key terms, jump to the relevant moments, and tag or clip the statements that matter. Pull those clips into a reel or export the timestamped transcript to feed directly into your case notes.",
features:["Upload","Transcription","Keyword Search","Tags","Clips","Reel"],
outcome:"The strongest parts of the witness interview are clipped and ready. You have a timestamped record of what was said and when. Nothing gets buried in a long recording."}
]},
{id:3,title:"Discovery Review",desc:"Get oriented in what you have, triage what matters, and surface what's missing.",scenarios:[
{id:1,title:"I haven't even looked at what I have yet.",
situation:"You're seeing the client tomorrow. You haven't reviewed any of the discovery. You're not even sure what footage you have.",
problem:"Starting from zero is disorienting. You don't want to walk into a client meeting blind — but you also can't spend 6 hours watching everything before tomorrow.",
helps:"Upload your discovery to Reduct and run batch summaries across all your files. Within a short window you have an overview of each recording — who's in it, what stage of the incident it covers, roughly what happened. Use this as your orientation map before diving deeper.",
features:["Upload","Batch Summarize","Project View"],
outcome:"You know what you have. You know what you're missing. You can walk into the client meeting informed — and you can tell your investigator exactly what else to go collect."},
{id:2,title:"I have 12 body-cam files. I don't know which one to start with.",
situation:"You're in discovery review. You have footage from multiple officers and you need to figure out which video captures the most of the incident — so you can watch that one first and use the others to fill in gaps.",
problem:"Watching 12 videos sequentially takes all day. You need a way to triage before you commit your time.",
helps:"Use Reduct's timeline view to see how all your recordings map against each other chronologically. At a glance, you can see which officer's footage covers the longest window, which ones overlap, and where there are gaps. Then switch to multi-cam to watch the most relevant footage together instead of one at a time.",
features:["Timeline","Multi-Cam View"],
outcome:"You spend 20 minutes triaging instead of 6 hours watching. You start with the footage that matters most. You use the others for peripheral awareness — context, not the main focus."},
{id:3,title:"The body-cam is in Spanish. I speak English.",
situation:"Your client and the key witness on the body-cam speak Spanish. You don't. You need to know whether this is a significant issue in the case before you decide whether to invest in a certified translation.",
problem:"Getting a certified translation takes weeks and costs real money. But you can't make a decision about a recording you can't understand.",
helps:"Run Reduct's AI translation on the recording. You get a working transcript in English — not certified, but enough to understand what's being said. Now you can assess whether the content matters enough to pursue a certified translation, or flag specific moments that need closer attention.",
features:["Translation","Transcription","Keyword Search"],
outcome:"You understand the gist of the recording within the hour. You can make an informed call on whether to invest in certified translation. You're not flying blind — and you're not waiting weeks to find out if it matters."},
{id:4,title:"I got a dump of 30 jail calls.",
situation:"The prosecution dropped 30 jail calls in discovery. You need to know what's in them — especially anything your client said that could hurt the case — before the DA uses it against you.",
problem:"Listening to 30 calls manually takes a full day. You need to know what's in there, fast, without listening to everything.",
helps:"Upload the jail calls to Reduct and batch transcribe. Then search across all 30 calls at once for key terms — names, dates, specific incidents. Reduct surfaces the moments that matter. You can listen to those clips, ignore the noise, and know what you're dealing with before the DA does.",
features:["Batch Transcription","Batch Summarize","Keyword Search","Search Across Project"],
outcome:"You've reviewed 30 calls without listening to 30 calls. You know what's in there. You know what the DA might use. And you found it faster than they expect you to."},
{id:5,title:"I think I'm missing a body-cam. I need to figure out which officer it belongs to.",
situation:"You have footage from multiple officers, but something feels off. You think there's a recording that wasn't produced. You need to figure out which officer corresponds to which camera — so you can formally request what you're missing.",
problem:"Matching officers to body-cam files is tedious. Audit logs help but they take time to work through.",
helps:"Use Reduct's multi-cam view and audit log tools to reconcile officers against footage. Lay them out together. Cross-reference names mentioned in transcripts, badge numbers, and filing metadata. Build a map of who has footage and who doesn't.",
features:["Multi-Cam View","Audit Logs","Keyword Search","Timeline"],
outcome:"You know exactly which officer is missing. You have a clear basis for your formal request. You look more prepared than the prosecution expects."}
]},
{id:4,title:"Plea Negotiations",desc:"Show clients what the prosecution actually has. Handle night-before evidence drops.",scenarios:[
{id:1,title:"My client doesn't believe the evidence is as bad as it is.",
situation:"Your case is weak, but your client is convinced they can fight it. Part of your job right now is showing them what the prosecution actually has — so they can make a realistic decision about the plea offer.",
problem:"Telling a client the evidence is bad isn't enough. They need to see it. But walking them through hours of footage in a visit isn't practical.",
helps:"Build a reel in Reduct of the most damaging moments from the body-cam. Keep it short — 5 to 10 minutes of the specific clips that show the strongest parts of the prosecution's case. Use multi-cam view to show the same moment from multiple officers' angles. Share the reel or bring it into the client meeting.",
features:["Reel","Multi-Cam View","Clips","Share"],
outcome:"Your client has seen the evidence — not heard about it. The conversation shifts. They're more likely to engage seriously with the plea offer, and they trust that you've actually done the work."},
{id:2,title:"A better plea offer just came in the night before trial.",
situation:"The prosecution dropped new evidence and a revised plea offer the night before trial. You need to assess the new material fast and advise your client.",
problem:"Night-before dumps are designed to overwhelm. You don't have time for a full review.",

// ── STATE ────────────────────────────────────────────────────
const S={view:'home',sid:null,scid:null,q:''};

// ── FEATURE LINKS ────────────────────────────────────────────
// Replace individual values with direct doc URLs as they become available.
const _D='https://drive.google.com/drive/folders/1u_AMzNkSWsZqe-smsi0f4Bn33mc3EbsR';
const FEATURE_LINKS={
  'Upload':'https://help.reduct.video/en/articles/upload-files-into-reduct',
  'Batch Summarize':'https://help.reduct.video/en/articles/ai-summaries#batch-summarize',
  'Custom Summary':'https://help.reduct.video/en/articles/ai-summaries#get-a-custom-summary-of-your-recording',
  'Collaboration in Reduct':'https://help.reduct.video/en/articles/collaboration-in-reduct',
  'Summary Review':_D,'Keyword Search':_D,'Fuzzy Search':_D,'Transcript Navigation':_D,
  'Comments':_D,'Tags':_D,'Clip Export':_D,'Share':_D,
  'Transcription':_D,'Clips':_D,'Reel':_D,'Project View':_D,
  'Timeline':_D,'Multi-Cam View':_D,'Translation':_D,
  'Batch Transcription':_D,'Search Across Project':_D,
  'Audit Logs':_D,'Share Link':_D,'Redact':_D,
  'Transcript Download':_D,'Re-Transcribe':_D,
  'Tags as Chapters':_D,'Captions':_D,'Project':_D,'Ask a Recording':_D
};
const _ARR=`<svg class="tag-arr" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg>`;
function tagLink(f){const url=FEATURE_LINKS[f]||_D;return`<a href="${url}" target="_blank" rel="noopener" class="tag">${h(f)}${_ARR}</a>`;}

// ── ICONS ───────────────────────────────────────────────────
const IC={
search:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
play:`<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`,
chev:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>`,
back:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>`
};

// ── HELPERS ──────────────────────────────────────────────────
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function paras(s){return s.split('\n\n').map(p=>`<p>${h(p)}</p>`).join('')}
const IC_CLIP=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const IC_CHECK=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
function copyQList(btn){
  navigator.clipboard.writeText(btn.dataset.text).then(()=>{
    btn.innerHTML=IC_CHECK;btn.classList.add('copied');
    setTimeout(()=>{btn.innerHTML=IC_CLIP;btn.classList.remove('copied');},2000);
  });
}
// Renders helps: accepts a string or an array of strings/arrays (arrays = bullet lists)
function renderHelps(helps){
  if(typeof helps==='string') return paras(helps);
  let stepN=0;
  return helps.map(item=>{
    if(Array.isArray(item)){
      const dataText=item.join('\n').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      return`<div class="q-list-wrap"><button class="copy-btn" data-text="${dataText}" onclick="copyQList(this)" title="Copy questions">${IC_CLIP}</button><ul class="sc-bullets sc-q-list">${item.map(li=>`<li>${h(li)}</li>`).join('')}</ul></div>`;
    }
    if(item&&typeof item==='object'&&item.head){
      stepN++;
      return`<div class="helps-head"><div class="helps-step-num">${stepN}</div><div class="helps-step-title">${h(item.head)}</div></div>`;
    }
    return`<p>${h(item)}</p>`;
  }).join('');
}
function stage(id){return STAGES.find(s=>s.id===id)}
function scenario(sid,scid){const s=stage(sid);return s&&s.scenarios.find(x=>x.id===scid)}

// ── NAVIGATE ─────────────────────────────────────────────────
function nav(view,sid,scid){
  S.view=view;S.sid=sid||null;S.scid=scid||null;S.q='';
  const hash=view==='home'?'/':`/${view}${sid?'/'+sid:''}${scid?'/'+scid:''}`;
  history.pushState(null,'','#'+hash);
  render();window.scrollTo(0,0);
}
function search(q){
  S.q=q;S.view=q.trim()?'search':'home';
  if(!q.trim()){S.sid=null;S.scid=null;}
  render();
}

window.addEventListener('popstate',()=>{
  const p=parseHash();Object.assign(S,p,{q:''});render();window.scrollTo(0,0);
});
function parseHash(){
  const hsh=window.location.hash.slice(1)||'/';
  const pts=hsh.split('/').filter(Boolean);
  if(!pts.length||pts[0]==='')return{view:'home'};
  if(pts[0]==='stage'&&pts[1])return{view:'stage',sid:+pts[1]};
  if(pts[0]==='scenario'&&pts[1]&&pts[2])return{view:'scenario',sid:+pts[1],scid:+pts[2]};
  return{view:'home'};
}

// ── RENDER HEADER ────────────────────────────────────────────
function rHdr(){
  return`<header id="hdr">
<div class="logo" onclick="nav('home')">
  <span class="logo-brand">Reduct</span>
  <span class="logo-sep"></span>
  <span class="logo-sub">Scenario Guide</span>
</div>
<div class="hsearch">${IC.search}
<input id="sinput" type="text" placeholder="Find a scenario…" value="${h(S.q)}" oninput="search(this.value)" autocomplete="off" spellcheck="false">
</div></header>`;
}

// ── RENDER SIDEBAR ───────────────────────────────────────────
function rSbar(){
  const show=S.view==='stage'||S.view==='scenario';
  const items=STAGES.map(st=>{
    const active=S.view!=='scenario'&&S.sid===st.id;
    const expand=S.view==='scenario'&&S.sid===st.id;
    let x=`<div class="sb-item${active?' on':''}" onclick="nav('stage',${st.id})"><span class="sb-num">${st.id}</span><span>${h(st.title)}</span></div>`;
    if(expand){
      x+=`<div class="sb-subs">`+st.scenarios.map(sc=>`<div class="sb-sub${S.scid===sc.id?' on':''}" onclick="nav('scenario',${st.id},${sc.id})">${h(sc.title)}</div>`).join('')+`</div>`;
    }
    return x;
  }).join('');
  return`<nav id="sbar" class="${show?'on':''}">${items}</nav>`;
}

// ── HOME ─────────────────────────────────────────────────────
function rHome(){
  const cards=STAGES.map(st=>`
<div class="s-card" onclick="nav('stage',${st.id})">
  <div class="s-card-head"><div class="s-badge">${st.id}</div><h3>${h(st.title)}</h3></div>
  <p>${h(st.desc)}</p>
  <div class="s-card-foot"><span class="sc-count">${st.scenarios.length} scenario${st.scenarios.length!==1?'s':''}</span><span class="c-arrow">${IC.chev}</span></div>
</div>`).join('');
  return`<div class="home-hero"><h1>Where are you in the case?</h1><p>Pick a stage to see how Reduct fits into your workflow. We've organized it by different real-case scenarios that fall across all these stages.</p></div>
<div class="home-body"><div class="sec-label">Case Stages</div><div class="stage-grid">${cards}</div></div>`;
}

// ── STAGE PAGE ───────────────────────────────────────────────
function rStage(){
  const st=stage(S.sid);if(!st)return`<div class="empty">Stage not found.</div>`;
  const cards=st.scenarios.map(sc=>`
<div class="sc-card" onclick="nav('scenario',${st.id},${sc.id})">
  <h3>${h(sc.title)}</h3>
  <div class="sc-prev">${h(sc.situation)}</div>
  <div class="tags">${sc.features.map(f=>`<span class="tag">${h(f)}</span>`).join('')}</div>
</div>`).join('');
  return`<div class="phdr">
<div class="bc"><span class="lnk" onclick="nav('home')">All stages</span><span class="sep">›</span><span>Stage ${st.id}</span></div>
<h1>${h(st.title)}</h1>
<p class="sub">${st.scenarios.length} scenario${st.scenarios.length!==1?'s':''}</p>
</div><div class="sc-list">${cards}</div>`;
}

// ── SCENARIO PAGE ─────────────────────────────────────────────
function rScenario(){
  const st=stage(S.sid),sc=scenario(S.sid,S.scid);
  if(!st||!sc)return`<div class="empty">Scenario not found.</div>`;

  let secs='';
  const tocItems=[['#sit','The Situation']];

  // Situation (always present)
  secs+=`<div class="sc-sec" id="sit"><div class="sec-h">The Situation</div><div class="sec-body">${paras(sc.situation)}</div></div>`;

  // Optional: what attorneys are feeling
  if(sc.feeling&&sc.feeling.length){
    secs+=`<div class="sc-sec" id="feeling"><div class="sec-h">What attorneys are feeling</div><div class="feeling-tags">${sc.feeling.map(f=>`<span class="feeling-tag">${h(f)}</span>`).join('')}</div></div>`;
    tocItems.push(['#feeling','What attorneys are feeling']);
  }

  // Optional: how it's done today
  if(sc.todayMethod&&sc.todayMethod.length){
    secs+=`<div class="sc-sec" id="today"><div class="sec-h">How it's done today</div><ul class="sc-bullets">${sc.todayMethod.map(m=>`<li>${h(m)}</li>`).join('')}</ul></div>`;
    tocItems.push(['#today',"How it's done today"]);
  }

  // Optional: what good looks like
  if(sc.whatGood&&sc.whatGood.length){
    secs+=`<div class="sc-sec" id="good"><div class="sec-h">What good looks like</div><ul class="sc-bullets">${sc.whatGood.map(m=>`<li>${h(m)}</li>`).join('')}</ul></div>`;
    tocItems.push(['#good','What good looks like']);
  }

  // Optional: the problem (older scenarios that still have it)
  if(sc.problem){
    secs+=`<div class="sc-sec" id="prob"><div class="sec-h">The Problem</div><div class="sec-body">${paras(sc.problem)}</div></div>`;
    tocItems.push(['#prob','The Problem']);
  }

  // Outcome — plain text, before How Reduct Helps (optional)
  if(sc.outcome){
    secs+=`<div class="sc-sec" id="out"><div class="sec-body">${paras(sc.outcome)}</div></div>`;
    tocItems.push(['#out','Outcome']);
  }

  // How Reduct helps (always present)
  secs+=`<div class="sc-sec" id="helps"><div class="sec-h-lg">How Reduct helps</div><div class="sec-body">${renderHelps(sc.helps)}</div></div>`;
  tocItems.push(['#helps','How Reduct helps']);

  // Features Used
  secs+=`<div class="sc-sec" id="feat"><div class="sec-h">Features Used</div><div class="tags">${sc.features.map(f=>tagLink(f)).join('')}</div></div>`;
  tocItems.push(['#feat','Features Used']);

  // Optional: FAQs
  if(sc.faqs&&sc.faqs.length){
    const faqHtml=sc.faqs.map(f=>`<div class="faq-item"><div class="faq-q">${h(f.q)}</div><div class="faq-a">${h(f.a)}</div></div>`).join('');
    secs+=`<div class="sc-sec" id="faq"><div class="sec-h">FAQs</div><div class="faq-list">${faqHtml}</div></div>`;
    tocItems.push(['#faq','FAQs']);
  }

  const toc=`<div class="sc-toc"><div class="toc-h">In this scenario</div>${tocItems.map(([href,label])=>`<a class="toc-a" href="${href}" onclick="scrollTo('${href}',event)">${label}</a>`).join('')}</div>`;
  const art=`<article class="sc-art"><div class="sc-meta"><div class="stage-tag" onclick="nav('stage',${st.id})">${IC.back} Stage ${st.id}: ${h(st.title)}</div><h1>${h(sc.title)}</h1></div>${secs}</article>`;
  return`<div class="sc-layout">${art}${toc}</div>`;
}

// ── SEARCH PAGE ───────────────────────────────────────────────
function rSearch(){
  const q=S.q.toLowerCase().trim();
  if(!q)return rHome();
  const results=[];
  STAGES.forEach(st=>{
    const m=st.scenarios.filter(sc=>{
      const helpsText=Array.isArray(sc.helps)?sc.helps.flat().join(' '):sc.helps||'';
      return sc.title.toLowerCase().includes(q)||
             sc.situation.toLowerCase().includes(q)||
             helpsText.toLowerCase().includes(q)||
             (sc.outcome||'').toLowerCase().includes(q)||
             sc.features.some(f=>f.toLowerCase().includes(q));
    });
    if(m.length)results.push({st,m});
  });
  if(!results.length)return`<div class="no-res"><h3>No results for "${h(S.q)}"</h3><p>Try a different term, or browse by case stage below.</p></div>`;
  const total=results.reduce((s,r)=>s+r.m.length,0);
  const groups=results.map(({st,m})=>`<div class="srch-grp">
<div class="srch-grp-t">Stage ${st.id}: ${h(st.title)}</div>
${m.map(sc=>`<div class="sr-item" onclick="nav('scenario',${st.id},${sc.id})"><div class="sr-t">${h(sc.title)}</div><div class="sr-p">${h(sc.situation)}</div></div>`).join('')}
</div>`).join('');
  return`<div class="srch-page"><div class="srch-hdr"><h2>${total} result${total!==1?'s':''} for "${h(S.q)}"</h2><p>Matching scenarios across all case stages.</p></div>${groups}</div>`;
}

// ── TOC SCROLL ────────────────────────────────────────────────
function scrollTo(id,e){
  e&&e.preventDefault();
  const el=document.querySelector(id);
  if(el){const top=el.getBoundingClientRect().top+window.pageYOffset-76;window.scrollTo({top,behavior:'smooth'});}
}
function updateToc(){
  const links=document.querySelectorAll('.toc-a');
  const ids=Array.from(links).map(a=>a.getAttribute('href'));
  let cur=ids[0];
  ids.forEach(id=>{const el=document.querySelector(id);if(el&&el.getBoundingClientRect().top<=90)cur=id;});
  links.forEach(a=>a.classList.toggle('on',a.getAttribute('href')===cur));
}
let _tocBound=false;

// ── MAIN RENDER ───────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  const focused=document.activeElement&&document.activeElement.id==='sinput';
  const cur=focused?document.activeElement.selectionStart:0;

  let content='';
  switch(S.view){
    case'stage':content=rStage();break;
    case'scenario':content=rScenario();break;
    case'search':content=rSearch();break;
    default:content=rHome();
  }
  const hasSb=S.view==='stage'||S.view==='scenario';
  root.innerHTML=`${rHdr()}<div id="body">${rSbar()}<main id="main" class="${hasSb?'sb':''}">${content}</main></div>`;

  if(focused){const i=document.getElementById('sinput');if(i){i.focus();i.setSelectionRange(cur,cur);}}

  window.removeEventListener('scroll',updateToc);
  if(S.view==='scenario'){
    window.addEventListener('scroll',updateToc,{passive:true});
    _tocBound=true;
    updateToc();
  } else {
    _tocBound=false;
  }
}

// ── INIT ─────────────────────────────────────────────────────
const init=parseHash();Object.assign(S,init);
render();
</script>
